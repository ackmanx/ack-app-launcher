<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="manifest" href="../manifest.json" />
    <link rel="icon" href="apple.png" />

    <link rel="stylesheet" href="global.css" />

    <title>Ack! App Launcher</title>

    <script>
      window.apps = {
        spotify: {
          cover_art: 'https://cdn-icons-png.flaticon.com/512/725/725281.png',
          name: 'Spotify',
          platform: 'non-game',
        },
      }
    </script>
  </head>
  <body>
    <div id="dashboard"></div>

    <script>
      const container = document.getElementById('dashboard')

      Object.keys(window.apps).forEach((app_name) => {
        const app = window.apps[app_name]

        const steam_id = app.steam_id_for_cover

        let image_url

        if (app.cover_art) {
          image_url = app.cover_art
        } else if (app.steam_id_for_cover) {
          image_url = `https://steamcdn-a.akamaihd.net/steam/apps/${app.steam_id_for_cover}/library_600x900.jpg`
        } else {
          image_url = ''
        }

        const card = document.createElement('a')

        card.href = `ack-app-launch://${app_name}`

        if (app.platform === 'non-game') {
          card.className = 'app-card non-game'
        } else {
          card.className = 'app-card game'
        }

        card.innerHTML = `<img src="${image_url}" alt="${app_name} ${app.name}">`
        container.appendChild(card)
      })
    </script>
  </body>
</html>
