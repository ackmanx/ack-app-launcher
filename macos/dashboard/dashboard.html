<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="manifest" href="../manifest.json" />
    <link rel="icon" href="apple.png" />

    <link rel="stylesheet" href="global.css" />

    <title>Ack! App Launcher</title>

    <script>
      window.apps = {
        spotify: {
          cover_art: 'https://cdn-icons-png.flaticon.com/512/725/725281.png',
          name: 'Spotify',
        },
        antigravity: {
          cover_art:
            'https://mac009.com/uploads/20251119/5c9e95d70c9cb87bc2724867a8de9fc5.png',
          name: 'Antigravity',
        },
        firefox_dev: {
          cover_art: '',
          name: 'Firefox Developer Edition',
        },
        lego_studio: {
          cmd: 'open -a Studio',
        },
        amphetamine: {
          cmd: 'open -a Amphetamine',
        },
        bartender: {
          cmd: "open -a 'Bartender 5'",
        },
        blackmagic_disk_speed_test: {
          cmd: "open -a 'Blackmagic Disk Speed Test'",
        },
        bluesnooze: {
          cmd: 'open -a Bluesnooze',
        },
        capcut: {
          cmd: 'open -a CapCut',
        },
        disk_space_analyzer: {
          cmd: "open -a 'Disk Space Analyzer'",
        },
        dropbox: {
          cmd: 'open -a Dropbox',
        },
        find_my: {
          cmd: "open -a 'Find My'",
        },
        forklift: {
          cmd: 'open -a Forklift',
        },
        iterm: {
          cmd: 'open -a iTerm',
        },
        jetbrains_toolbox: {
          cmd: "open -a 'Jetbrains Toolbox'",
        },
        little_snitch: {
          cmd: "open -a 'Little Snitch'",
        },
        mongodb_compass: {
          cmd: "open -a 'MongoDB Compass'",
        },
        naps2: {
          cmd: 'open -a NAPS2',
        },
        opencode: {
          cmd: 'open -a OpenCode',
        },
        pixelmator_pro: {
          cmd: 'open -a Pixelmator Pro',
        },
        proton_mail: {
          cmd: "open -a 'Proton Mail'",
        },
        proton_pass: {
          cmd: "open -a 'Proton Pass'",
        },
        rectangle: {
          cmd: 'open -a Rectangle',
        },
        warp_terminal: {
          cmd: "open -a 'Warp Terminal'",
        },
        zed: {
          cmd: 'open -a Zed',
        },
      }
    </script>
  </head>
  <body>
    <div id="dashboard"></div>

    <script>
      const container = document.getElementById('dashboard')

      //Loop through each app and create a card for it
      Object.keys(window.apps).forEach((app_name) => {
        const app = window.apps[app_name]

        let image_url

        if (app.cover_art) {
          image_url = app.cover_art
        } else {
          image_url = ''
        }

        const card = document.createElement('a')

        card.href = `ack-app-launch://${app_name}`
        card.className = 'app-card non-game'
        card.innerHTML = `<img src="${image_url}" alt="${app_name} ${app.name}">`

        container.appendChild(card)
      })
    </script>
  </body>
</html>
